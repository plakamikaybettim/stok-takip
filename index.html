<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StokTakip Pro - Standalone</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-zinc-50 text-zinc-900 antialiased">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };
        const SidebarItem = ({ icon, label, active, onClick }) => (
            <button onClick={onClick} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-200 ${active ? "bg-black text-white shadow-lg shadow-black/10" : "text-zinc-500 hover:bg-zinc-100 hover:text-zinc-900"}`}>
                <Icon name={icon} size={20} />
                <span className="font-medium text-sm">{label}</span>
                {active && <Icon name="chevron-right" size={16} className="ml-auto" />}
            </button>
        );
        const Card = ({ children, title, subtitle }) => (
            <div className="bg-white rounded-2xl border border-zinc-100 shadow-sm overflow-hidden">
                {(title) && <div className="px-6 py-4 border-b border-zinc-100"><div><h3 className="font-semibold text-zinc-900">{title}</h3>{subtitle && <p className="text-xs text-zinc-500 mt-0.5">{subtitle}</p>}</div></div>}
                <div className="p-6">{children}</div>
            </div>
        );
        const StatCard = ({ label, value, icon, colorClass }) => (
            <div className="bg-white p-6 rounded-2xl border border-zinc-100 shadow-sm flex items-center gap-4">
                <div className={`p-3 rounded-xl ${colorClass}`}><Icon name={icon} size={24} className="text-white" /></div>
                <div><p className="text-xs font-medium text-zinc-500 uppercase tracking-wider">{label}</p><p className="text-2xl font-bold text-zinc-900 mt-1">{value}</p></div>
            </div>
        );
        function App() {
            const [activeTab, setActiveTab] = useState("dashboard");
            const [products, setProducts] = useState(() => JSON.parse(localStorage.getItem('st_products') || '[]'));
            const [entries, setEntries] = useState(() => JSON.parse(localStorage.getItem('st_entries') || '[]'));
            const [sales, setSales] = useState(() => JSON.parse(localStorage.getItem('st_sales') || '[]'));
            useEffect(() => { localStorage.setItem('st_products', JSON.stringify(products)); }, [products]);
            useEffect(() => { localStorage.setItem('st_entries', JSON.stringify(entries)); }, [entries]);
            useEffect(() => { localStorage.setItem('st_sales', JSON.stringify(sales)); }, [sales]);
            const [newProduct, setNewProduct] = useState({ code: "", category: "", model: "", size: "", color: "", buy_price: 0, sell_price: 0 });
            const [newEntry, setNewEntry] = useState({ date: new Date().toISOString().split('T')[0], product_code: "", quantity: 0 });
            const [newSale, setNewSale] = useState({ date: new Date().toISOString().split('T')[0], product_code: "", quantity: 0, price: 0 });
            const stockStatus = useMemo(() => {
                return products.map(p => {
                    const totalIn = entries.filter(e => e.product_code === p.code).reduce((acc, curr) => acc + curr.quantity, 0);
                    const totalOut = sales.filter(s => s.product_code === p.code).reduce((acc, curr) => acc + curr.quantity, 0);
                    const remaining = totalIn - totalOut;
                    return { ...p, total_in: totalIn, total_out: totalOut, remaining: remaining, status: remaining < 10 ? "STOK AZ" : "OK" };
                });
            }, [products, entries, sales]);
            const totalRevenue = sales.reduce((acc, s) => acc + (s.quantity * s.price), 0);
            const handleAddProduct = (e) => { e.preventDefault(); if (products.find(p => p.code === newProduct.code)) return alert("Bu kod zaten mevcut!"); setProducts([...products, { ...newProduct, id: Date.now() }]); setNewProduct({ code: "", category: "", model: "", size: "", color: "", buy_price: 0, sell_price: 0 }); };
            const handleAddEntry = (e) => { e.preventDefault(); setEntries([{ ...newEntry, id: Date.now() }, ...entries]); setNewEntry({ ...newEntry, quantity: 0 }); };
            const handleAddSale = (e) => { e.preventDefault(); setSales([{ ...newSale, id: Date.now(), total: newSale.quantity * newSale.price }, ...sales]); setNewSale({ ...newSale, quantity: 0, price: 0 }); };
            const deleteProduct = (code) => { if (confirm("Bu ürünü silmek istediğinize emin misiniz?")) { setProducts(products.filter(p => p.code !== code)); } };
            return (
                <div className="min-h-screen bg-zinc-50 flex">
                    <aside className="w-64 bg-white border-r border-zinc-200 p-6 flex flex-col gap-8 sticky top-0 h-screen">
                        <div className="flex items-center gap-3 px-2"><div className="w-10 h-10 bg-black rounded-xl flex items-center justify-center"><Icon name="package" className="text-white" size={24} /></div><h1 className="font-bold text-xl tracking-tight">StokTakip<span className="text-zinc-400">Pro</span></h1></div>
                        <nav className="flex flex-col gap-1">
                            <SidebarItem icon="layout-dashboard" label="Dashboard" active={activeTab === "dashboard"} onClick={() => setActiveTab("dashboard")} />
                            <SidebarItem icon="package" label="Ürünler" active={activeTab === "products"} onClick={() => setActiveTab("products")} />
                            <SidebarItem icon="package-plus" label="Stok Girişi" active={activeTab === "stock-entry"} onClick={() => setActiveTab("stock-entry")} />
                            <SidebarItem icon="shopping-cart" label="Satışlar" active={activeTab === "sales"} onClick={() => setActiveTab("sales")} />
                            <SidebarItem icon="bar-chart-3" label="Raporlar" active={activeTab === "reports"} onClick={() => setActiveTab("reports")} />
                        </nav>
                        <div className="mt-auto p-4 bg-zinc-50 rounded-2xl border border-zinc-100"><div className="flex items-center gap-2 text-zinc-500 text-xs font-medium uppercase tracking-wider mb-2"><Icon name="alert-triangle" size={14} className="text-amber-500" />Kritik Stok</div><p className="text-2xl font-bold">{stockStatus.filter(s => s.remaining < 10).length}</p></div>
                    </aside>
                    <main className="flex-1 p-10 overflow-auto">
                        <header className="flex items-center justify-between mb-10"><div><h2 className="text-3xl font-bold tracking-tight capitalize">{activeTab.replace("-", " ")}</h2><p className="text-zinc-500 mt-1">İşletmenizin güncel durumu.</p></div></header>
                        {activeTab === "dashboard" && (
                            <div className="space-y-8">
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                                    <StatCard label="Toplam Ürün" value={products.length} icon="package" colorClass="bg-blue-500" />
                                    <StatCard label="Toplam Satış" value={totalRevenue.toLocaleString('tr-TR')} icon="trending-up" colorClass="bg-emerald-500" />
                                    <StatCard label="Stoktaki Adet" value={stockStatus.reduce((acc, s) => acc + s.remaining, 0)} icon="package-plus" colorClass="bg-violet-500" />
                                    <StatCard label="Kritik Stok" value={stockStatus.filter(s => s.remaining < 10).length} icon="alert-triangle" colorClass="bg-amber-500" />
                                </div>
                                <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                                    <Card title="Son Satışlar" subtitle="En son yapılan 5 işlem">
                                        <div className="space-y-4">{sales.slice(0, 5).map((sale) => { const p = products.find(prod => prod.code === sale.product_code); return (<div key={sale.id} className="flex items-center justify-between p-3 hover:bg-zinc-50 rounded-xl transition-colors"><div className="flex items-center gap-3"><div className="w-10 h-10 bg-zinc-100 rounded-lg flex items-center justify-center text-zinc-600"><Icon name="shopping-cart" size={20} /></div><div><p className="font-semibold text-sm">{p?.model || 'Bilinmeyen'} - {p?.size || '-'}</p><p className="text-xs text-zinc-500">{sale.date} • {sale.product_code}</p></div></div><div className="text-right"><p className="font-bold text-sm">+{sale.total} TL</p><p className="text-[10px] text-zinc-400">{sale.quantity} Adet</p></div></div>); })}</div>
                                    </Card>
                                    <Card title="Kritik Stok Uyarıları" subtitle="Stok seviyesi 10'un altında olanlar">
                                        <div className="space-y-4">{stockStatus.filter(s => s.remaining < 10).slice(0, 5).map((item) => (<div key={item.code} className="flex items-center justify-between p-3 hover:bg-zinc-50 rounded-xl transition-colors"><div className="flex items-center gap-3"><div className="w-10 h-10 bg-amber-50 rounded-lg flex items-center justify-center text-amber-600"><Icon name="alert-triangle" size={20} /></div><div><p className="font-semibold text-sm">{item.model} - {item.size}</p><p className="text-xs text-zinc-500">{item.code} • {item.color}</p></div></div><div className="text-right"><p className="font-bold text-sm text-amber-600">{item.remaining} Adet</p></div></div>))}</div>
                                    </Card>
                                </div>
                            </div>
                        )}
                        {activeTab === "products" && (
                            <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                                <div className="lg:col-span-1">
                                    <Card title="Yeni Ürün Ekle">
                                        <form onSubmit={handleAddProduct} className="space-y-4">
                                            <div className="space-y-1"><label className="text-xs font-semibold text-zinc-500 uppercase">Ürün Kodu</label><input required value={newProduct.code} onChange={e => setNewProduct({...newProduct, code: e.target.value})} type="text" className="w-full p-3 bg-zinc-50 border border-zinc-200 rounded-xl" placeholder="Örn: SU001" /></div>
                                            <div className="grid grid-cols-2 gap-4">
                                                <div className="space-y-1"><label className="text-xs font-semibold text-zinc-500 uppercase">Kategori</label><input required value={newProduct.category} onChange={e => setNewProduct({...newProduct, category: e.target.value})} type="text" className="w-full p-3 bg-zinc-50 border border-zinc-200 rounded-xl" placeholder="Sütyen" /></div>
                                                <div className="space-y-1"><label className="text-xs font-semibold text-zinc-500 uppercase">Model</label><input required value={newProduct.model} onChange={e => setNewProduct({...newProduct, model: e.target.value})} type="text" className="w-full p-3 bg-zinc-50 border border-zinc-200 rounded-xl" placeholder="Lara" /></div>
                                            </div>
                                            <div className="grid grid-cols-2 gap-4">
                                                <div className="space-y-1"><label className="text-xs font-semibold text-zinc-500 uppercase">Beden</label><input required value={newProduct.size} onChange={e => setNewProduct({...newProduct, size: e.target.value})} type="text" className="w-full p-3 bg-zinc-50 border border-zinc-200 rounded-xl" placeholder="75B" /></div>
                                                <div className="space-y-1"><label className="text-xs font-semibold text-zinc-500 uppercase">Renk</label><input required value={newProduct.color} onChange={e => setNewProduct({...newProduct, color: e.target.value})} type="text" className="w-full p-3 bg-zinc-50 border border-zinc-200 rounded-xl" placeholder="Siyah" /></div>
                                            </div>
                                            <div className="grid grid-cols-2 gap-4">
                                                <div className="space-y-1"><label className="text-xs font-semibold text-zinc-500 uppercase">Alış Fiyatı</label><input required value={newProduct.buy_price} onChange={e => setNewProduct({...newProduct, buy_price: Number(e.target.value)})} type="number" className="w-full p-3 bg-zinc-50 border border-zinc-200 rounded-xl" /></div>
                                                <div className="space-y-1"><label className="text-xs font-semibold text-zinc-500 uppercase">Satış Fiyatı</label><input required value={newProduct.sell_price} onChange={e => setNewProduct({...newProduct, sell_price: Number(e.target.value)})} type="number" className="w-full p-3 bg-zinc-50 border border-zinc-200 rounded-xl" /></div>
                                            </div>
                                            <button type="submit" className="w-full bg-black text-white py-3 rounded-xl font-bold mt-4">Ürünü Kaydet</button>
                                        </form>
                                    </Card>
                                </div>
                                <div className="lg:col-span-2">
                                    <Card title="Ürün Listesi">
                                        <div className="overflow-x-auto">
                                            <table className="w-full text-left">
                                                <thead><tr className="border-b border-zinc-100"><th className="pb-4 text-xs uppercase text-zinc-500">Kod</th><th className="pb-4 text-xs uppercase text-zinc-500">Model</th><th className="pb-4 text-xs uppercase text-zinc-500">Beden/Renk</th><th className="pb-4 text-xs uppercase text-zinc-500">Fiyat</th><th className="pb-4"></th></tr></thead>
                                                <tbody className="divide-y divide-zinc-50">{products.map(p => (<tr key={p.id} className="hover:bg-zinc-50"><td className="py-4 text-sm font-bold">{p.code}</td><td className="py-4 text-sm">{p.model}</td><td className="py-4 text-sm text-zinc-500">{p.size} / {p.color}</td><td className="py-4 text-sm font-medium">{p.buy_price} / {p.sell_price} TL</td><td className="py-4 text-right"><button onClick={() => deleteProduct(p.code)} className="p-2 text-zinc-400 hover:text-red-500"><Icon name="trash-2" size={18} /></button></td></tr>))}</tbody>
                                            </table>
                                        </div>
                                    </Card>
                                </div>
                            </div>
                        )}
                        {activeTab === "stock-entry" && (
                            <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                                <div className="lg:col-span-1">
                                    <Card title="Stok Girişi Yap">
                                        <form onSubmit={handleAddEntry} className="space-y-4">
                                            <div className="space-y-1"><label className="text-xs font-semibold text-zinc-500 uppercase">Tarih</label><input required value={newEntry.date} onChange={e => setNewEntry({...newEntry, date: e.target.value})} type="date" className="w-full p-3 bg-zinc-50 border border-zinc-200 rounded-xl" /></div>
                                            <div className="space-y-1"><label className="text-xs font-semibold text-zinc-500 uppercase">Ürün Seçin</label><select required value={newEntry.product_code} onChange={e => setNewEntry({...newEntry, product_code: e.target.value})} className="w-full p-3 bg-zinc-50 border border-zinc-200 rounded-xl appearance-none"><option value="">Ürün Seçiniz...</option>{products.map(p => (<option key={p.id} value={p.code}>{p.code} - {p.model} ({p.size})</option>))}</select></div>
                                            <div className="space-y-1"><label className="text-xs font-semibold text-zinc-500 uppercase">Adet</label><input required value={newEntry.quantity} onChange={e => setNewEntry({...newEntry, quantity: Number(e.target.value)})} type="number" className="w-full p-3 bg-zinc-50 border border-zinc-200 rounded-xl" /></div>
                                            <button type="submit" className="w-full bg-black text-white py-3 rounded-xl font-bold mt-4">Stok Ekle</button>
                                        </form>
                                    </Card>
                                </div>
                                <div className="lg:col-span-2">
                                    <Card title="Son Stok Girişleri">
                                        <div className="overflow-x-auto">
                                            <table className="w-full text-left">
                                                <thead><tr className="border-b border-zinc-100"><th className="pb-4 text-xs uppercase text-zinc-500">Tarih</th><th className="pb-4 text-xs uppercase text-zinc-500">Ürün</th><th className="pb-4 text-xs uppercase text-zinc-500">Adet</th></tr></thead>
                                                <tbody className="divide-y divide-zinc-50">{entries.map(e => { const p = products.find(prod => prod.code === e.product_code); return (<tr key={e.id} className="hover:bg-zinc-50"><td className="py-4 text-sm text-zinc-500">{e.date}</td><td className="py-4 text-sm"><span className="font-bold">{e.product_code}</span><span className="ml-2 text-zinc-400">{p?.model || 'Bilinmeyen'}</span></td><td className="py-4 text-sm font-bold text-emerald-600">+{e.quantity}</td></tr>); })}</tbody>
                                            </table>
                                        </div>
                                    </Card>
                                </div>
                            </div>
                        )}
                        {activeTab === "sales" && (
                            <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                                <div className="lg:col-span-1">
                                    <Card title="Yeni Satış Kaydı">
                                        <form onSubmit={handleAddSale} className="space-y-4">
                                            <div className="space-y-1"><label className="text-xs font-semibold text-zinc-500 uppercase">Tarih</label><input required value={newSale.date} onChange={e => setNewSale({...newSale, date: e.target.value})} type="date" className="w-full p-3 bg-zinc-50 border border-zinc-200 rounded-xl" /></div>
                                            <div className="space-y-1"><label className="text-xs font-semibold text-zinc-500 uppercase">Ürün Seçin</label><select required value={newSale.product_code} onChange={e => { const p = products.find(prod => prod.code === e.target.value); setNewSale({...newSale, product_code: e.target.value, price: p?.sell_price || 0}); }} className="w-full p-3 bg-zinc-50 border border-zinc-200 rounded-xl appearance-none"><option value="">Ürün Seçiniz...</option>{products.map(p => (<option key={p.id} value={p.code}>{p.code} - {p.model} ({p.size})</option>))}</select></div>
                                            <div className="grid grid-cols-2 gap-4">
                                                <div className="space-y-1"><label className="text-xs font-semibold text-zinc-500 uppercase">Adet</label><input required value={newSale.quantity} onChange={e => setNewSale({...newSale, quantity: Number(e.target.value)})} type="number" className="w-full p-3 bg-zinc-50 border border-zinc-200 rounded-xl" /></div>
                                                <div className="space-y-1"><label className="text-xs font-semibold text-zinc-500 uppercase">Birim Fiyat</label><input required value={newSale.price} onChange={e => setNewSale({...newSale, price: Number(e.target.value)})} type="number" className="w-full p-3 bg-zinc-50 border border-zinc-200 rounded-xl" /></div>
                                            </div>
                                            <div className="p-4 bg-zinc-900 rounded-xl text-white flex justify-between items-center"><span className="text-xs font-medium uppercase opacity-60 tracking-widest">Toplam</span><span className="text-xl font-bold">{(newSale.quantity * newSale.price).toLocaleString('tr-TR')} TL</span></div>
                                            <button type="submit" className="w-full bg-black text-white py-3 rounded-xl font-bold mt-2">Satışı Onayla</button>
                                        </form>
                                    </Card>
                                </div>
                                <div className="lg:col-span-2">
                                    <Card title="Satış Geçmişi">
                                        <div className="overflow-x-auto">
                                            <table className="w-full text-left">
                                                <thead><tr className="border-b border-zinc-100"><th className="pb-4 text-xs uppercase text-zinc-500">Tarih</th><th className="pb-4 text-xs uppercase text-zinc-500">Ürün</th><th className="pb-4 text-xs uppercase text-zinc-500">Adet</th><th className="pb-4 text-xs uppercase text-zinc-500">Toplam</th></tr></thead>
                                                <tbody className="divide-y divide-zinc-50">{sales.map(s => { const p = products.find(prod => prod.code === s.product_code); return (<tr key={s.id} className="hover:bg-zinc-50"><td className="py-4 text-sm text-zinc-500">{s.date}</td><td className="py-4 text-sm"><span className="font-bold">{s.product_code}</span><span className="ml-2 text-zinc-400">{p?.model || 'Bilinmeyen'}</span></td><td className="py-4 text-sm">{s.quantity}</td><td className="py-4 text-sm font-bold">{s.total.toLocaleString('tr-TR')} TL</td></tr>); })}</tbody>
                                            </table>
                                        </div>
                                    </Card>
                                </div>
                            </div>
                        )}
                        {activeTab === "reports" && (
                            <div className="space-y-8">
                                <Card title="Stok Durumu" subtitle="Ürün bazlı detaylı stok raporu">
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-left">
                                            <thead><tr className="border-b border-zinc-100"><th className="pb-4 text-xs uppercase text-zinc-500">Kod</th><th className="pb-4 text-xs uppercase text-zinc-500">Model</th><th className="pb-4 text-xs uppercase text-zinc-500">Gelen</th><th className="pb-4 text-xs uppercase text-zinc-500">Satılan</th><th className="pb-4 text-xs uppercase text-zinc-500">Kalan</th><th className="pb-4 text-xs uppercase text-zinc-500">Durum</th></tr></thead>
                                            <tbody className="divide-y divide-zinc-50">{stockStatus.map(item => (<tr key={item.code} className="hover:bg-zinc-50"><td className="py-4 text-sm font-bold">{item.code}</td><td className="py-4 text-sm">{item.model} ({item.size})</td><td className="py-4 text-sm text-emerald-600 font-medium">{item.total_in}</td><td className="py-4 text-sm text-red-600 font-medium">{item.total_out}</td><td className="py-4 text-sm font-bold">{item.remaining}</td><td className="py-4"><span className={`px-2 py-1 rounded-md text-[10px] font-bold uppercase tracking-wider ${item.status === "OK" ? "bg-emerald-50 text-emerald-600" : "bg-amber-50 text-amber-600"}`}>{item.status}</span></td></tr>))}</tbody>
                                        </table>
                                    </div>
                                </Card>
                            </div>
                        )}
                    </main>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
