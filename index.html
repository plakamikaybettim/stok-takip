<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StokTakip Pro - Mobil Uyumlu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        input, select, button { font-size: 16px !important; } /* Mobilde zoom yapmasını engeller */
    </style>
</head>
<body class="bg-zinc-50 text-zinc-900 antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        function App() {
            const [activeTab, setActiveTab] = useState("dashboard");
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            
            // Veriler
            const [products, setProducts] = useState(() => JSON.parse(localStorage.getItem('st_products') || '[]'));
            const [entries, setEntries] = useState(() => JSON.parse(localStorage.getItem('st_entries') || '[]'));
            const [sales, setSales] = useState(() => JSON.parse(localStorage.getItem('st_sales') || '[]'));

            useEffect(() => { localStorage.setItem('st_products', JSON.stringify(products)); }, [products]);
            useEffect(() => { localStorage.setItem('st_entries', JSON.stringify(entries)); }, [entries]);
            useEffect(() => { localStorage.setItem('st_sales', JSON.stringify(sales)); }, [sales]);

            // Formlar
            const [newProduct, setNewProduct] = useState({ code: "", category: "", model: "", size: "", color: "", buy_price: 0, sell_price: 0 });
            const [newEntry, setNewEntry] = useState({ date: new Date().toISOString().split('T')[0], product_code: "", quantity: 0 });
            const [newSale, setNewSale] = useState({ date: new Date().toISOString().split('T')[0], product_code: "", quantity: 0, price: 0 });

            const stockStatus = useMemo(() => {
                return products.map(p => {
                    const totalIn = entries.filter(e => e.product_code === p.code).reduce((acc, curr) => acc + curr.quantity, 0);
                    const totalOut = sales.filter(s => s.product_code === p.code).reduce((acc, curr) => acc + curr.quantity, 0);
                    const remaining = totalIn - totalOut;
                    return { ...p, total_in: totalIn, total_out: totalOut, remaining, status: remaining < 10 ? "STOK AZ" : "OK" };
                });
            }, [products, entries, sales]);

            const totalRevenue = sales.reduce((acc, s) => acc + (s.quantity * s.price), 0);

            const navItems = [
                { id: "dashboard", label: "Dashboard", icon: "layout-dashboard" },
                { id: "products", label: "Ürünler", icon: "package" },
                { id: "stock-entry", label: "Stok Girişi", icon: "package-plus" },
                { id: "sales", label: "Satışlar", icon: "shopping-cart" },
                { id: "reports", label: "Raporlar", icon: "bar-chart-3" }
            ];

            const handleTabChange = (id) => {
                setActiveTab(id);
                setIsMenuOpen(false);
                window.scrollTo(0, 0);
            };

            return (
                <div className="min-h-screen flex flex-col lg:flex-row">
                    {/* Mobil Header */}
                    <header className="lg:hidden bg-white border-b border-zinc-200 p-4 flex items-center justify-between sticky top-0 z-50">
                        <div className="flex items-center gap-2">
                            <div className="w-8 h-8 bg-black rounded-lg flex items-center justify-center">
                                <Icon name="package" className="text-white" size={18} />
                            </div>
                            <h1 className="font-bold text-lg">StokTakip<span className="text-zinc-400">Pro</span></h1>
                        </div>
                        <button onClick={() => setIsMenuOpen(!isMenuOpen)} className="p-2 bg-zinc-100 rounded-lg">
                            <Icon name={isMenuOpen ? "x" : "menu"} size={24} />
                        </button>
                    </header>

                    {/* Sidebar (Masaüstü ve Mobil Menü) */}
                    <aside className={`
                        fixed inset-0 z-40 bg-white p-6 flex flex-col gap-8 transition-transform duration-300 lg:relative lg:translate-x-0 lg:w-64 lg:border-r lg:border-zinc-200
                        ${isMenuOpen ? "translate-x-0" : "-translate-x-full"}
                    `}>
                        <div className="hidden lg:flex items-center gap-3 px-2">
                            <div className="w-10 h-10 bg-black rounded-xl flex items-center justify-center">
                                <Icon name="package" className="text-white" size={24} />
                            </div>
                            <h1 className="font-bold text-xl tracking-tight">StokTakip<span className="text-zinc-400">Pro</span></h1>
                        </div>

                        <nav className="flex flex-col gap-1 mt-12 lg:mt-0">
                            {navItems.map(item => (
                                <button
                                    key={item.id}
                                    onClick={() => handleTabChange(item.id)}
                                    className={`w-full flex items-center gap-3 px-4 py-4 lg:py-3 rounded-xl transition-all ${
                                        activeTab === item.id ? "bg-black text-white" : "text-zinc-500 hover:bg-zinc-100"
                                    }`}
                                >
                                    <Icon name={item.icon} size={20} />
                                    <span className="font-medium">{item.label}</span>
                                </button>
                            ))}
                        </nav>
                    </aside>

                    {/* Ana İçerik */}
                    <main className="flex-1 p-4 lg:p-10 bg-zinc-50">
                        <div className="max-w-5xl mx-auto">
                            <h2 className="text-2xl lg:text-3xl font-bold mb-6 capitalize">{activeTab.replace("-", " ")}</h2>

                            {activeTab === "dashboard" && (
                                <div className="space-y-6">
                                    <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
                                        <div className="bg-white p-4 rounded-xl border border-zinc-100 shadow-sm">
                                            <p className="text-[10px] text-zinc-500 uppercase font-bold">Ürün</p>
                                            <p className="text-xl font-bold">{products.length}</p>
                                        </div>
                                        <div className="bg-white p-4 rounded-xl border border-zinc-100 shadow-sm">
                                            <p className="text-[10px] text-zinc-500 uppercase font-bold">Satış</p>
                                            <p className="text-xl font-bold">{totalRevenue.toLocaleString('tr-TR')} TL</p>
                                        </div>
                                        <div className="bg-white p-4 rounded-xl border border-zinc-100 shadow-sm">
                                            <p className="text-[10px] text-zinc-500 uppercase font-bold">Stok</p>
                                            <p className="text-xl font-bold">{stockStatus.reduce((acc, s) => acc + s.remaining, 0)}</p>
                                        </div>
                                        <div className="bg-white p-4 rounded-xl border border-zinc-100 shadow-sm">
                                            <p className="text-[10px] text-zinc-500 uppercase font-bold">Kritik</p>
                                            <p className="text-xl font-bold text-amber-600">{stockStatus.filter(s => s.remaining < 10).length}</p>
                                        </div>
                                    </div>

                                    <div className="bg-white rounded-xl border border-zinc-100 p-4 shadow-sm">
                                        <h3 className="font-bold mb-4">Son Satışlar</h3>
                                        <div className="space-y-3">
                                            {sales.slice(0, 5).map(s => {
                                                const p = products.find(prod => prod.code === s.product_code);
                                                return (
                                                    <div key={s.id} className="flex justify-between items-center text-sm border-b border-zinc-50 pb-2">
                                                        <div>
                                                            <p className="font-bold">{p?.model || s.product_code}</p>
                                                            <p className="text-xs text-zinc-400">{s.date}</p>
                                                        </div>
                                                        <p className="font-bold">+{s.total} TL</p>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                </div>
                            )}

                            {activeTab === "products" && (
                                <div className="space-y-6">
                                    <div className="bg-white p-6 rounded-xl border border-zinc-100 shadow-sm">
                                        <h3 className="font-bold mb-4">Yeni Ürün</h3>
                                        <form onSubmit={(e) => { e.preventDefault(); setProducts([...products, {...newProduct, id: Date.now()}]); setNewProduct({code:"", category:"", model:"", size:"", color:"", buy_price:0, sell_price:0}); }} className="space-y-4">
                                            <input required placeholder="Ürün Kodu" className="w-full p-3 bg-zinc-50 border border-zinc-200 rounded-lg" value={newProduct.code} onChange={e => setNewProduct({...newProduct, code: e.target.value})} />
                                            <div className="grid grid-cols-2 gap-4">
                                                <input required placeholder="Model" className="p-3 bg-zinc-50 border border-zinc-200 rounded-lg" value={newProduct.model} onChange={e => setNewProduct({...newProduct, model: e.target.value})} />
                                                <input required placeholder="Beden" className="p-3 bg-zinc-50 border border-zinc-200 rounded-lg" value={newProduct.size} onChange={e => setNewProduct({...newProduct, size: e.target.value})} />
                                            </div>
                                            <div className="grid grid-cols-2 gap-4">
                                                <input required type="number" placeholder="Alış" className="p-3 bg-zinc-50 border border-zinc-200 rounded-lg" onChange={e => setNewProduct({...newProduct, buy_price: Number(e.target.value)})} />
                                                <input required type="number" placeholder="Satış" className="p-3 bg-zinc-50 border border-zinc-200 rounded-lg" onChange={e => setNewProduct({...newProduct, sell_price: Number(e.target.value)})} />
                                            </div>
                                            <button className="w-full bg-black text-white p-4 rounded-xl font-bold">Kaydet</button>
                                        </form>
                                    </div>
                                    <div className="bg-white rounded-xl border border-zinc-100 overflow-hidden shadow-sm">
                                        <table className="w-full text-left text-sm">
                                            <thead className="bg-zinc-50"><tr><th className="p-3">Kod</th><th className="p-3">Model</th><th className="p-3 text-right">Fiyat</th></tr></thead>
                                            <tbody className="divide-y divide-zinc-50">
                                                {products.map(p => (
                                                    <tr key={p.id}><td className="p-3 font-bold">{p.code}</td><td className="p-3">{p.model}</td><td className="p-3 text-right">{p.sell_price} TL</td></tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            )}

                            {activeTab === "stock-entry" && (
                                <div className="space-y-6">
                                    <div className="bg-white p-6 rounded-xl border border-zinc-100 shadow-sm">
                                        <h3 className="font-bold mb-4">Stok Girişi</h3>
                                        <form onSubmit={(e) => { e.preventDefault(); setEntries([{...newEntry, id: Date.now()}, ...entries]); setNewEntry({...newEntry, quantity: 0}); }} className="space-y-4">
                                            <select required className="w-full p-3 bg-zinc-50 border border-zinc-200 rounded-lg" value={newEntry.product_code} onChange={e => setNewEntry({...newEntry, product_code: e.target.value})}>
                                                <option value="">Ürün Seçin</option>
                                                {products.map(p => <option key={p.id} value={p.code}>{p.code} - {p.model}</option>)}
                                            </select>
                                            <input required type="number" placeholder="Adet" className="w-full p-3 bg-zinc-50 border border-zinc-200 rounded-lg" value={newEntry.quantity} onChange={e => setNewEntry({...newEntry, quantity: Number(e.target.value)})} />
                                            <button className="w-full bg-black text-white p-4 rounded-xl font-bold">Stok Ekle</button>
                                        </form>
                                    </div>
                                </div>
                            )}

                            {activeTab === "sales" && (
                                <div className="space-y-6">
                                    <div className="bg-white p-6 rounded-xl border border-zinc-100 shadow-sm">
                                        <h3 className="font-bold mb-4">Yeni Satış</h3>
                                        <form onSubmit={(e) => { e.preventDefault(); setSales([{...newSale, id: Date.now(), total: newSale.quantity * newSale.price}, ...sales]); setNewSale({...newSale, quantity: 0, price: 0}); }} className="space-y-4">
                                            <select required className="w-full p-3 bg-zinc-50 border border-zinc-200 rounded-lg" value={newSale.product_code} onChange={e => {
                                                const p = products.find(prod => prod.code === e.target.value);
                                                setNewSale({...newSale, product_code: e.target.value, price: p?.sell_price || 0});
                                            }}>
                                                <option value="">Ürün Seçin</option>
                                                {products.map(p => <option key={p.id} value={p.code}>{p.code} - {p.model}</option>)}
                                            </select>
                                            <div className="grid grid-cols-2 gap-4">
                                                <input required type="number" placeholder="Adet" className="p-3 bg-zinc-50 border border-zinc-200 rounded-lg" value={newSale.quantity} onChange={e => setNewSale({...newSale, quantity: Number(e.target.value)})} />
                                                <input required type="number" placeholder="Fiyat" className="p-3 bg-zinc-50 border border-zinc-200 rounded-lg" value={newSale.price} onChange={e => setNewSale({...newSale, price: Number(e.target.value)})} />
                                            </div>
                                            <button className="w-full bg-black text-white p-4 rounded-xl font-bold">Satışı Onayla</button>
                                        </form>
                                    </div>
                                </div>
                            )}

                            {activeTab === "reports" && (
                                <div className="bg-white rounded-xl border border-zinc-100 overflow-hidden shadow-sm">
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-left text-sm">
                                            <thead className="bg-zinc-50"><tr><th className="p-3">Model</th><th className="p-3 text-center">Kalan</th><th className="p-3 text-right">Durum</th></tr></thead>
                                            <tbody className="divide-y divide-zinc-50">
                                                {stockStatus.map(item => (
                                                    <tr key={item.code}>
                                                        <td className="p-3 font-medium">{item.model}</td>
                                                        <td className="p-3 text-center font-bold">{item.remaining}</td>
                                                        <td className="p-3 text-right">
                                                            <span className={`px-2 py-1 rounded text-[10px] font-bold ${item.status === "OK" ? "bg-emerald-50 text-emerald-600" : "bg-amber-50 text-amber-600"}`}>{item.status}</span>
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            )}
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
